services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    command: caddy reverse-proxy --from ${DOMAIN} --to gmailapp:8080
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - gmailapp
    restart: unless-stopped

  gmailapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gmailapp
    expose:
      - "8080"
    volumes:
      - gmailapp_data:/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Data Source=/data/gmail.db
      - Smtp__Host=${SMTP_HOST}
      - Smtp__Port=${SMTP_PORT}
      - Smtp__Username=${SMTP_USERNAME}
      - Smtp__Password=${SMTP_PASSWORD}
      - Smtp__SenderName=${SMTP_SENDER_NAME}
      - Smtp__SenderEmail=${SMTP_SENDER_EMAIL}
      - Smtp__ReplyTo=${SMTP_REPLY_TO}
      - Smtp__UseStartTls=${SMTP_USE_STARTTLS}
      - DashboardAuth__Username=${DASH_USERNAME}
      - DashboardAuth__Password=${DASH_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  gmailapp_data:
  caddy_data:
  caddy_config:
